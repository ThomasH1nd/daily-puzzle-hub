<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c3e50"> 
    <title>Daily Puzzle Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <header>
        <div class="header-content">
            <div class="title-container">
                <img src="icon.png" alt="Puzzle Piece Icon" class="header-icon">
                <h1>Daily Puzzle Hub</h1>
            </div>
            <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
        </div>
    </header>

    <section class="hero-section">
        <p>Can't decide? Let fate choose your next puzzle!</p>
        <button id="random-btn" class="random-btn-large">🎲 Play a Random Game</button>
    </section>

    <main id="game-container">
        </main>

    <script src="script.js"></script>
</body>
</html>
